name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run type checking
        run: npm run typecheck
        
      - name: Build project
        run: npm run build:prod
        
      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build:prod
        
      - name: Verify package contents
        run: |
          echo "Checking package contents..."
          npm pack --dry-run
          echo "✅ Package contents verified"
          
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [test, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Get tag version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Claude Auto Resume ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🚀 Claude Auto Resume ${{ steps.get_version.outputs.VERSION }}
            
            ### ✨ 新功能
            - 完整的TypeScript CLI工具，替代shell脚本版本
            - 自动检测Claude使用限制并智能等待
            - 支持继续对话和自定义命令执行
            - 增强的错误处理和调试模式
            
            ### 🛠️ 技术特性
            - TypeScript严格模式，完整类型安全
            - 92%+测试覆盖率，384个测试用例
            - 用户友好的命令行界面
            - 跨平台支持（Linux/macOS/Windows）
            - <65ms启动时间，性能优化
            
            ### 📦 安装
            ```bash
            # 全局安装
            npm install -g claude-auto-resume
            
            # 直接使用（无需安装）
            npx claude-auto-resume "continue"
            ```
            
            ### 🚀 使用示例
            ```bash
            # 基本使用
            claude-auto-resume "continue"
            claude-auto-resume "implement user authentication"
            
            # 继续对话
            claude-auto-resume -c "resume previous task"
            
            # 执行自定义命令
            claude-auto-resume -e "npm run dev"
            claude-auto-resume -e "python app.py"
            
            # 调试模式
            claude-auto-resume --debug --check
            
            # 测试模式（开发用）
            claude-auto-resume --test-mode 5 "test prompt"
            ```
            
            ### 🔄 从Shell脚本迁移
            ```bash
            # 卸载旧版本（如果通过make安装）
            sudo make uninstall
            
            # 安装新的TypeScript版本
            npm install -g claude-auto-resume
            
            # 所有命令完全兼容！
            claude-auto-resume "same commands work"
            ```
            
            ### 📋 更新日志
            查看 [CHANGELOG.md](https://github.com/terryso/claude-auto-resume/blob/main/CHANGELOG.md) 获取详细更新内容。
            
            ⚠️ **安全提示**: 默认使用 `--dangerously-skip-permissions` 标志，仅在可信环境中使用。
          draft: false
          prerelease: false
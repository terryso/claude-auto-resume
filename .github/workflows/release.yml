name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run type checking
        run: npm run typecheck
        
      - name: Build project
        run: npm run build:prod
        
      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build:prod
        
      - name: Verify package contents
        run: |
          echo "Checking package contents..."
          npm pack --dry-run
          echo "✅ Package contents verified"
          
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [test, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Get tag version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Extract version without 'v' prefix for CHANGELOG lookup
          VERSION_NUMBER=${VERSION#v}
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_OUTPUT
        
      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION_NUMBER="${{ steps.get_version.outputs.VERSION_NUMBER }}"
          
          # Extract the changelog content for this version
          if [ -f "CHANGELOG.md" ]; then
            # First try to find the exact version
            CHANGELOG_CONTENT=$(awk -v version="$VERSION_NUMBER" '
              BEGIN { in_version = 0; content = "" }
              /^## \[/ {
                if (in_version) exit
                if ($0 ~ "\\[" version "\\]") {
                  in_version = 1
                  next
                }
              }
              in_version && !/^## \[/ { 
                if (content) content = content "\n" $0
                else content = $0
              }
              END { print content }
            ' CHANGELOG.md)
            
            # If no exact match found, use the latest version (first non-Unreleased entry)
            if [ -z "$CHANGELOG_CONTENT" ]; then
              CHANGELOG_CONTENT=$(awk '
                BEGIN { in_version = 0; content = ""; found_version = 0 }
                /^## \[/ {
                  if (in_version) exit
                  if ($0 !~ "Unreleased" && !found_version) {
                    in_version = 1
                    found_version = 1
                    next
                  }
                }
                in_version && !/^## \[/ { 
                  if (content) content = content "\n" $0
                  else content = $0
                }
                END { print content }
              ' CHANGELOG.md)
            fi
            
            # If no specific version found, use a default message
            if [ -z "$CHANGELOG_CONTENT" ]; then
              CHANGELOG_CONTENT="## 🚀 Claude Auto Resume ${{ steps.get_version.outputs.VERSION }}

This release includes bug fixes, performance improvements and new features.

See [CHANGELOG.md](https://github.com/terryso/claude-auto-resume/blob/main/CHANGELOG.md) for detailed changes."
            else
              # Add header to the extracted content
              CHANGELOG_CONTENT="## 🚀 Claude Auto Resume ${{ steps.get_version.outputs.VERSION }}

$CHANGELOG_CONTENT

---

📋 **View full changelog**: [CHANGELOG.md](https://github.com/terryso/claude-auto-resume/blob/develop/CHANGELOG.md)

⚠️ **Security Notice**: Uses \`--dangerously-skip-permissions\` flag by default. Only use in trusted environments."
            fi
          else
            CHANGELOG_CONTENT="## 🚀 Claude Auto Resume ${{ steps.get_version.outputs.VERSION }}

This release includes improvements and bug fixes."
          fi
          
          # Output the changelog content for the release
          echo 'CONTENT<<EOF' >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Claude Auto Resume ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CONTENT }}
          draft: false
          prerelease: false